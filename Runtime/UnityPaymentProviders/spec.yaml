openapi: 3.0.3
info:
  title: IAP API
  contact:
    name: 'Team: Creator Economy'
    x-slack-channel: '#ask-creator-economy'
  version: 1.0.0
  x-unity-gateway:
    configVersion: 1
    documentation:
      internal:
        publishing: enabled
      public:
        publishing: unlisted
      group: In-App Purchases
      service: IAP
      title: Client API
    rateLimiters:
      userRateLimiter:
        targets:
          - key: playerId
          - key: projectId
          - key: environmentId
        limits:
          - unit: minute
            limit: 600
      webhookRateLimiter:
        targets:
          - key: ip
          - key: paymentProviderId
        limits:
          - unit: minute
            limit: 600000
      serviceAccountRateLimiter:
        targets:
          - key: serviceAccountId
          - key: tokenIssuer
            value: unity-services-roles
        limits:
          - unit: minute
            limit: 12000
      # Staging-only overrides for load testing. Mirrors the
      # playerAuthRatelimiterStaging pattern in player-auth. Each player-facing
      # route below references these from a `staging:` block, which replaces the
      # production limiters in the staging environment only.
      userRateLimiterStaging:
        targets:
          - key: playerId
          - key: projectId
          - key: environmentId
        limits:
          - unit: minute
            limit: 1000000
      serviceAccountRateLimiterStaging:
        targets:
          - key: serviceAccountId
          - key: tokenIssuer
            value: unity-services-roles
        limits:
          - unit: minute
            limit: 1000000
  description: |
    # Introduction
      Unity IAP is a unified solution for managing digital commerce and implementing in-app purchases across games, stores, and third-party payment providers. These APIs provide a fully managed entitlement system that handles orders and fulfillment through third-party payment providers.
    # Concepts
      ## Payment Providers
      - Order: A purchase initiated through a third-party payment provider, managed through the entitlement system from creation to fulfillment.
      - Entitlement: A player's right to access a purchased product, tracked and managed across all supported payment providers.

tags:
  - name: Payment provider
    description: Payment provider endpoints
  - name: Mock checkout
    description: Mock payment provider checkout endpoints, used by the embedded mock checkout UI to let game developers test IAP integration end-to-end without configuring a real payment provider. Not intended for live games.

servers:
  - url: https://iap.services.api.unity.com
    x-unity-gateway:
      environment: production
  - url: https://iap-stg.services.api.unity.com
    x-unity-gateway:
      environment: staging
x-unity-gateway:
  documentation:
    visibility: internal
  service: iap
  resourceGating:
    china:
      disabled: true
  production:
    upstream:
      host: transaction-verifier.production.psc.gateway.internal.unity.com
  staging:
    upstream:
      host: transaction-verifier.staging.psc.gateway.internal.unity.com
  xUser: true
  eventCollection: {}
  upstream:
    jwsVersion: 2
    timeout: 25s
    port: 80
    supportsHttps: false

paths:
  /v1/projects/{projectId}/environments/{environmentId}/order:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
      - $ref: '#/components/parameters/environmentId'
    post:
      summary: Create an order
      description: |-
        Initiates an order for a player to purchase a specific product from a payment provider.
        Supports webview-based flows and will support other flows in the future (which could return additional
        order data). The player information is stored and used to personalize the order experience.
        Currently supports exactly one SKU in the request.
      operationId: initiatePaymentProviderOrder
      tags:
        - Payment provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/order-request'
      responses:
        '200':
          description: Order successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order-response'
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '404':
          $ref: '#/components/responses/error-response-not-found'
        '409':
          $ref: '#/components/responses/error-response-order-already-entitled'
        '422':
          $ref: '#/components/responses/error-response-unprocessable-entity'
        '429':
          $ref: '#/components/responses/error-response-too-many-requests'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        resourcePolicyAuthorization:
          project: true
          player: true
          applyTo:
            authenticationType: ['jwt']
            issuers: ['player-auth']
        rateLimiters:
          - userRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
        headers:
          in:
            - authorization
            - Unity-IAP-Package-Version
            - Unity-Client-Version
            - Unity-Client-Mode
        rewrite:
          uri: /v1/projects/{projectId}/environments/{environmentId}/order
  /v1/projects/{projectId}/environments/{environmentId}/payment-providers:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
      - $ref: '#/components/parameters/environmentId'
    get:
      summary: List eligible configured payment providers
      description: |-
        Returns the list of configured payment providers the calling player is eligible for, based on their Live Releases
        variant tags and the project's tag-to-provider routing configuration. Providers are listed in priority
        order, highest first; clients should use the first entry by default. An empty list means no provider is
        eligible for this player; clients should handle this as a normal "external payment unavailable" state.
      operationId: listPaymentProviders
      tags:
        - Payment provider
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/payment-providers-response'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        resourcePolicyAuthorization:
          project: true
          player: true
          applyTo:
            authenticationType: ['jwt']
            issuers: ['player-auth']
        rateLimiters:
          - userRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
        rewrite:
          uri: /v1/projects/{projectId}/environments/{environmentId}/payment-providers
  /v1/projects/{projectId}/environments/{environmentId}/orders/{orderId}:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
      - $ref: '#/components/parameters/environmentId'
      - $ref: '#/components/parameters/unityOrderId'
    get:
      summary: Get order status
      description: |-
        Retrieves the status of an order. Returns 404 if no information has been received from the payment provider about the purchase yet.
      operationId: getOrder
      tags:
        - Payment provider
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order-response'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '404':
          $ref: '#/components/responses/error-response-not-found'
        '429':
          $ref: '#/components/responses/error-response-too-many-requests'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        resourcePolicyAuthorization:
          project: true
          player: true
          applyTo:
            authenticationType: ['jwt']
            issuers: ['player-auth']
        rateLimiters:
          - userRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
        headers:
          in:
            - Unity-IAP-Package-Version
            - Unity-Client-Version
            - Unity-Client-Mode
        rewrite:
          uri: /v1/projects/{projectId}/environments/{environmentId}/orders/{orderId}
    patch:
      summary: Update an order
      description: |-
        Updates an order. Used to mark an order as fulfilled or cancelled.
      operationId: updateOrder
      tags:
        - Payment provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-order-request'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/order-response'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '404':
          $ref: '#/components/responses/error-response-not-found'
        '409':
          $ref: '#/components/responses/error-response-order-invalid-state-transition'
        '429':
          $ref: '#/components/responses/error-response-too-many-requests'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        resourcePolicyAuthorization:
          project: true
          player: true
          applyTo:
            authenticationType: ['jwt']
            issuers: ['player-auth']
        rateLimiters:
          - userRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
        headers:
          in:
            - Unity-IAP-Package-Version
            - Unity-Client-Version
            - Unity-Client-Mode
        rewrite:
          uri: /v1/projects/{projectId}/environments/{environmentId}/orders/{orderId}
  /v1/projects/{projectId}/environments/{environmentId}/orders/entitled:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
      - $ref: '#/components/parameters/environmentId'
    get:
      summary: List player entitlements
      description: |-
        Returns an array of all orders that the player is entitled to.

        **Important**: Revoked orders are never included in the response, regardless of product type.

        Entitlement logic by product type:
        - **Consumables**: Included if not yet fulfilled.
        - **Non-consumables**: Always included.
        - **Subscriptions**: Not yet supported for external payment providers. Future behavior will be similar to non-consumables but will also require the subscription to not be expired.

        If there is a mix of types in the order, the order will be returned if any of the types are entitled.
      operationId: listEntitled
      tags:
        - Payment provider
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/order-response'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '404':
          $ref: '#/components/responses/error-response-not-found'
        '429':
          $ref: '#/components/responses/error-response-too-many-requests'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        resourcePolicyAuthorization:
          project: true
          player: true
          applyTo:
            authenticationType: ['jwt']
            issuers: ['player-auth']
        rateLimiters:
          - userRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
        headers:
          in:
            - Unity-IAP-Package-Version
            - Unity-Client-Version
            - Unity-Client-Mode
        rewrite:
          uri: /v1/projects/{projectId}/environments/{environmentId}/orders/entitled
  /v1/payment-providers/stripe/incoming:
    post:
      summary: Incoming Stripe Webhook
      operationId: handleStripeIncomingWebhook
      description: Endpoint for receiving incoming webhooks from Stripe.
      tags:
        - Payment provider
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Stripe webhook event payload
      responses:
        '200':
          description: Webhook received successfully
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
          allowMissingAuthHeader: true
        authorization:
          disabled: true
        headers:
          in:
            - stripe-signature
        rateLimiters:
          - webhookRateLimiter
        rewrite:
          uri: /anonymous/v1/payment-providers/stripe/incoming
  /v1/payment-providers/codapay/incoming:
    get:
      summary: Incoming CodaPay Webhook
      operationId: handleCodaPayIncomingWebhook
      description: Endpoint for receiving incoming payment notifications from CodaPay. CodaPay delivers these via GET with query parameters.
      tags:
        - Payment provider
      responses:
        '200':
          description: Webhook received successfully
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
      x-unity-gateway:
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
          allowMissingAuthHeader: true
        authorization:
          disabled: true
        rateLimiters:
          - webhookRateLimiter
        rewrite:
          uri: /anonymous/v1/payment-providers/codapay/incoming
  /v1/payment-providers/{paymentProviderId}/oauth/callback:
    parameters:
      - $ref: '#/components/parameters/paymentProviderId'
      - name: code
        in: query
        required: true
        description: OAuth authorization code
        schema:
          type: string
      - name: state
        in: query
        required: true
        description: OAuth state token
        schema:
          type: string
    get:
      x-unity-gateway:
        rewrite:
          uri: /anonymous/v1/payment-providers/{paymentProviderId}/oauth/callback
        authentication:
          jwt:
            issuers:
              - player-auth
              - cloud-code
              - unity-services-roles
          allowMissingAuthHeader: true
        authorization:
          disabled: true
        bodyProcessing:
          response: skip
        headers:
          out:
            - Content-Security-Policy
      summary: OAuth Callback Endpoint
      operationId: handleOAuthCallback
      description: OAuth callback endpoint for payment providers to redirect to after authorization.
      tags:
        - Payment provider
      responses:
        '200':
          description: OAuth authorization successful
          content:
            text/html:
              schema:
                type: string
                description: HTML response that closes the OAuth window
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
  /v1/payment-providers/codapay/onboarding/incoming:
    post:
      x-unity-gateway:
        rewrite:
          uri: /anonymous/v1/payment-providers/codapay/onboarding/incoming
        authentication:
          disabled: true
        authorization:
          disabled: true
        headers:
          in:
            - authorization
      summary: CodaPay Onboarding Account Link Callback
      operationId: handleCodaPayOnboardingIncoming
      description: Receives account-link callbacks from CodaPay during onboarding. Authenticated via CodaPay-issued JWT in the Authorization header.
      tags:
        - Payment provider
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer token (CodaPay-issued JWT)
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/account-link-request'
                - $ref: '#/components/schemas/account-link-initiated-request'
              discriminator:
                propertyName: method
                mapping:
                  'account-link': '#/components/schemas/account-link-request'
                  'account-link-initiated': '#/components/schemas/account-link-initiated-request'
      responses:
        '204':
          description: No Content (account link persisted successfully)
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '410':
          $ref: '#/components/responses/error-response-gone'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
  /v1/projects/{projectId}/catalog/products:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      summary: List the payment providers products with metadata and pricing information
      description: |-
        Endpoint to retrieve the necessary products metadata and pricing information to display in the IAP SDK at runtime
      operationId: listPaymentProvidersProducts
      tags:
        - Payment provider
      parameters:
        - $ref: '#/components/parameters/locale'
        - $ref: '#/components/parameters/currency'
        - name: sku
          in: query
          description: SKU identifier to filter products (can be specified multiple times)
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ['product-123', 'product-456']
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/product-response'
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '404':
          $ref: '#/components/responses/error-response-not-found'
        '429':
          $ref: '#/components/responses/error-response-too-many-requests'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers: ['player-auth', 'unity-services-roles']
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        rateLimiters:
          - userRateLimiter
          - serviceAccountRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
            - serviceAccountRateLimiterStaging
        headers:
          in:
            - authorization
            - Unity-IAP-Package-Version
            - Unity-Client-Version
            - Unity-Client-Mode
        rewrite:
          uri: /v1/projects/{projectId}/catalog/products
  /v1/projects/{projectId}/catalog/skus:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      summary: List the SKUs
      description: |-
        Endpoint to retrieve a list of SKUs available in the game as well as their type and shop specific identifier
      operationId: listSKUs
      tags:
        - Payment provider
      parameters:
        - name: store
          in: query
          description: Store identifier to filter SKU overrides (can be specified multiple times)
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ['apple', 'google']
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/sku-response'
        '400':
          $ref: '#/components/responses/error-response-bad-request'
        '401':
          $ref: '#/components/responses/error-response-unauthorized'
        '403':
          $ref: '#/components/responses/error-response-forbidden'
        '404':
          $ref: '#/components/responses/error-response-not-found'
        '429':
          $ref: '#/components/responses/error-response-too-many-requests'
        '500':
          $ref: '#/components/responses/error-response-internal-server-error'
        '503':
          $ref: '#/components/responses/error-response-service-unavailable'
      security:
        - Client: []
      x-unity-gateway:
        authentication:
          jwt:
            issuers: ['player-auth', 'unity-services-roles']
        authorization:
          rules:
            - authorizationType: token
              resourceId: projectId
              resourceType: project
            - authorizationType: audience
              audience: iap
              applyTo:
                authenticationType:
                  - jwt
                issuers:
                  - player-auth
        rateLimiters:
          - userRateLimiter
          - serviceAccountRateLimiter
        staging:
          rateLimiters:
            - userRateLimiterStaging
            - serviceAccountRateLimiterStaging
        headers:
          in:
            - authorization
            - Unity-IAP-Package-Version
            - Unity-Client-Version
            - Unity-Client-Mode
        rewrite:
          uri: /v1/projects/{projectId}/catalog/skus
  /v1/projects/{projectId}/catalog/store-overrides:
    x-unity-gateway:
      documentation:
        visibility: both
    parameters:
      - $ref: '#/components/parameters/projectId'
    get:
      summary: Resolve store-specific product ids to their Unity SKUs
      description: |-
        Reverse-lookup endpoint that resolves one or more store-specific product
        ids (Apple/Google/etc.) back to their Unity SKU and product type for the
        caller's live release. Returned as a map keyed by store, then by
        store-specific id; unmatched ids are omitted.

        A single store-specific id is expected to map to exactly one Unity SKU
        across the catalog. If multiple Unity SKUs (or multiple variants of the
        same Unity SKU with different types) declare the same store-specific id
        on the same store, only the first match is returned; later collisions
        are skipped and logged server-side. Keep store-specific ids unique
        across your catalog to avoid this.
      operationId: lookupStoreOverrides
      tags:
        - Payment provider
      parameters:
        - name: storeOverrideId
          in: query
          description: Store-specific product id to resolve. Required, may be supplied multiple times.
          required: true
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ['com.example.coins.100', 'gems_30_google']
        - name: store
          in: query
          description: Case-insensitive store filter (e.g., 'apple', 'google'). Only that store key appears in the response.
          required: true
          schema:
            type: string
          example: 'apple'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/store-override-lookup-response'
        '400':
