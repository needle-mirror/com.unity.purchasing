syntax = "proto3";

package insights.producers.iapsdk.v1alpha1;

import "google/protobuf/timestamp.proto";
import "insights/common/v1alpha1/consent.proto";
import "insights/common/v1alpha1/device_info.proto";
import "insights/common/v1alpha1/player_identity.proto";
import "insights/common/v1alpha1/reporting.proto";
import "insights/producers/iapsdk/v1alpha1/order_data.proto";
import "insights/producers/iapsdk/v1alpha1/store_payload.proto";

// IAPSDKEvent is the top-level envelope for IAP events fired from the
// Unity IAP SDK on iOS or Android.
//
// Self-contained: the Insights Gateway adds no envelope context, so this
// proto carries everything (identity, consent, device info, etc.). Most
// envelope fields are not directly accessible to the IAP SDK alone — they
// are populated by the engine / runtime module that wraps the IAP SDK's
// transaction event for transmission, sourced from Unity Services
// (Authentication, Core, Analytics).
//
// Delivered via two transports:
//   1. Direct HTTP POST to the Insights Gateway (binary protobuf).
//   2. Through the runtime module via OTel logs: `LogEvent(int eventType,
//      string eventData)` becomes an OTel log with attributes
//      `event.name = unity.managed_event` and
//      `unity.managed_event.type = <eventType>`, body = `eventData`
//      (canonical proto3 JSON encoding of this message).
//
// The same fields appear in both transports for now — OTel resource
// attributes are not relied upon. Field duplication may be reduced once
// resource-attribute coverage is confirmed.
message IAPSDKEvent {
  // Device clock at the moment the event was fired by the IAP SDK.
  google.protobuf.Timestamp timestamp = 1;

  // Unique event identifier (UUID), used as the idempotency key.
  // Generated by the runtime module when wrapping this event.
  string event_uuid = 2;

  // Player's current Unity session identifier.
  optional string session_id = 3;

  // Firebase Analytics per-app-launch session identifier.
  // Absent for games not using Firebase Analytics.
  optional string firebase_session_id = 4;

  // Unity project identifier.
  string project_id = 5;

  // Unity environment identifier (e.g. production, staging).
  string environment_id = 6;

  // SemVer version of the Unity IAP SDK that fired the event
  // (`com.unity.purchasing` package version).
  string iap_sdk_version = 7;

  // Engine version (e.g. Unity editor version) that built the application.
  string engine_version = 8;

  // Application version set by the developer when they build their game
  // (e.g. semver). Sourced from `Application.version`.
  string application_version = 21;

  // Player's consent state for ads-related data usage.
  insights.common.v1alpha1.ConsentState unity_consent_state_ads_intent = 9;

  // Player's consent state for analytics-related data usage.
  insights.common.v1alpha1.ConsentState unity_consent_state_analytics_intent = 10;

  // Player identity fields available on-device. Populated by the runtime
  // module from Unity Services / engine, not the IAP SDK directly.
  insights.common.v1alpha1.PlayerIdentity unity_identities = 11;

  // Device hardware metadata.
  insights.common.v1alpha1.DeviceInfo device_info = 12;

  // Application metadata (platform, app bundle id).
  insights.common.v1alpha1.Reporting reporting = 13;

  // Client-reported timestamp of when the game was installed on the device.
  google.protobuf.Timestamp installation_timestamp = 14;

  // The originating app store. Drives which payload variant in
  // PurchaseFulfilledEvent is populated.
  Store store = 15;

  // Order-level fields shared by every event variant. Partially populated
  // for failure events depending on how far the SDK got before failing.
  OrderData order = 16;

  // Event-specific payload. Each variant maps to its own dedicated L0 / L1
  // table pair (future work).
  oneof event_data {
    PurchaseIntentStartEvent purchase_intent_start_event = 17;
    PurchasePaidEvent purchase_paid_event = 18;
    PurchaseFailedEvent purchase_failed_event = 19;
    PurchaseFulfilledEvent purchase_fulfilled_event = 20;
    AuthenticationCompleteEvent authentication_complete_event = 22;
    PaymentOptionsShownEvent payment_options_shown_event = 23;
  }

  // Correlation key for one purchase journey across native / PSP / webshop.
  // Minted by the client that begins the journey (typically the Purchase
  // Options UI). Empty when the originating client did not emit one.
  optional string impression_id = 24;

  // Firebase application identifier (mobilesdk_app_id from
  // google-services.json). Used to forward IAP SDK events to the Google
  // Measurement Protocol for Connections Platform. Android only.
  optional string firebase_app_id = 100;
}

// Fires when the player initiates a purchase via the IAP SDK
// (`Product.PurchaseAsync` or equivalent). At this point the SKU is
// resolved but no store transaction id exists yet. Envelope fields
// (`IAPSDKEvent.order.sku`) carry all the available information.
message PurchaseIntentStartEvent {}

// Fires when the store confirms payment for the purchase: a transaction
// id has been issued and payment is settled, but the game has not yet
// acknowledged fulfilment. Envelope fields
// (`IAPSDKEvent.order.store_transaction_id`) carry the new identifier.
message PurchasePaidEvent {
    // Raw signed receipt and store-specific metadata. The active variant
  // must match `IAPSDKEvent.store`.
  oneof payload {
    AppStorePayload app_store_payload = 1;
    GooglePlayPayload google_play_payload = 2;
  }
}

// Fires once the player has been rewarded and the purchase is fully
// completed as reported by the Unity IAP SDK on-device.
message PurchaseFulfilledEvent {
  // Raw signed receipt and store-specific metadata. The active variant
  // must match `IAPSDKEvent.store`.
  oneof payload {
    AppStorePayload app_store_payload = 1;
    GooglePlayPayload google_play_payload = 2;
  }
}

// Represents an in-app purchase that failed before completing. Covers
// both user-cancelled flows (`FAILURE_REASON_USER_CANCELLED`) and
// store/SDK-reported failures — distinguished by `failure_reason`.
message PurchaseFailedEvent {
  // Failure category (mirrors UnityEngine.Purchasing.PurchaseFailureReason).
  FailureReason failure_reason = 1;

  // Human-readable detail message from the store / SDK
  // (`PurchaseFailureDescription.message`). May contain platform-specific
  // error codes or strings.
  optional string failure_message = 2;
}

// Mirrors `UnityEngine.Purchasing.PurchaseFailureReason` from the IAP SDK
// (`com.unity.purchasing/Runtime/Purchasing/PurchaseFailureReason.cs`).
enum FailureReason {
  FAILURE_REASON_UNSPECIFIED = 0;
  // Purchasing may be disabled in security settings.
  FAILURE_REASON_PURCHASING_UNAVAILABLE = 1;
  // Another purchase is already in progress.
  FAILURE_REASON_EXISTING_PURCHASE_PENDING = 2;
  // The product was reported unavailable by the purchasing system.
  FAILURE_REASON_PRODUCT_UNAVAILABLE = 3;
  // Signature validation of the purchase's receipt failed.
  FAILURE_REASON_SIGNATURE_INVALID = 4;
  // The user opted to cancel rather than proceed with the purchase.
  // Not specified on platforms that do not distinguish cancellation from
  // other failure.
  FAILURE_REASON_USER_CANCELLED = 5;
  // There was a problem with the payment. Apple-only.
  FAILURE_REASON_PAYMENT_DECLINED = 6;
  // The transaction has already been completed successfully.
  FAILURE_REASON_DUPLICATE_TRANSACTION = 7;
  // Transaction failed verification performed by the TX Verifier service.
  FAILURE_REASON_VALIDATION_FAILURE = 8;
  // The purchase couldn't be initiated because the store is not connected.
  FAILURE_REASON_STORE_NOT_CONNECTED = 9;
  // The billing client responded OK without including the purchase.
  // Google Play only.
  FAILURE_REASON_PURCHASE_MISSING = 10;
  // Catch-all for remaining purchase problems.
  FAILURE_REASON_UNKNOWN = 11;
  // The user is not authenticated with the store account required to
  // complete the purchase.
  FAILURE_REASON_USER_NOT_AUTHENTICATED = 12;
  // The requested operation is not supported on the current platform or
  // store.
  FAILURE_REASON_NOT_SUPPORTED = 13;
  // The order was cancelled by the store or system (distinct from
  // `FAILURE_REASON_USER_CANCELLED`, which is initiated by the user).
  FAILURE_REASON_ORDER_CANCELLED = 14;
  // The order's state changed in a way that prevents the purchase from
  // completing (e.g. transitioned out of a pending/confirmable state).
  FAILURE_REASON_ORDER_STATE_CHANGED = 15;
}

// Fires when the player has completed authentication required for a
// purchase journey (e.g. signed into a Unity Services account). Empty
// message body — the envelope identity fields carry the context.
message AuthenticationCompleteEvent {}

// The payment options that may be presented to the player. Native is
// always offered; any combination listed under
// `PaymentOptionsShownEvent.options_shown` includes it.
enum PaymentOption {
  PAYMENT_OPTION_UNSPECIFIED = 0;
  PAYMENT_OPTION_NATIVE = 1;
  PAYMENT_OPTION_STRIPE = 2;
  PAYMENT_OPTION_CODAPAY = 3;
  PAYMENT_OPTION_WEBSHOP = 4;
}

// The player can be presented multiple different payment options within
// the game, and then pick the one they want. This event describes which
// payment options were shown to the player; the exact payment provider
// picked by the player would be available in the subsequent completion
// event in either the IAP SDK proto or the IAP Backend proto.
message PaymentOptionsShownEvent {
  // The set of payment options shown to the player for this impression.
  // Native is always present; the player is shown 2 or 3 options total
  // (Native-only is never emitted, and there is no four-option
  // combination). Order is not significant. Repeated so consumers can
  // both count per option (e.g. UNNEST in BigQuery) and group by the
  // rendered combination. Only the first eligible PSP is shown, so
  // STRIPE and CODAPAY never co-occur — giving 6 valid combinations:
  //   [NATIVE, STRIPE]
  //   [CODAPAY, NATIVE]
  //   [NATIVE, WEBSHOP]
  //   [CODAPAY, NATIVE, STRIPE]
  //   [NATIVE, STRIPE, WEBSHOP]
  //   [CODAPAY, NATIVE, WEBSHOP]
  repeated PaymentOption options_shown = 1;

  // The player's remembered default option from a prior successful
  // purchase (provider memory / stickiness), pre-selected in the
  // chooser. Empty when the player has no remembered default.
  optional string options_default_provider = 2;
}
